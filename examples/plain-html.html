<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>form-persist — Plain HTML Example</title>
  <style>
    body { font-family: sans-serif; max-width: 540px; margin: 40px auto; padding: 0 16px; }
    .banner { background: #e8f4fd; border: 1px solid #bee3f8; border-radius: 6px; padding: 12px; margin-bottom: 16px; }
    .banner button { margin-right: 8px; }
    label { display: block; margin: 8px 0 4px; }
    input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button[type="submit"] { margin-top: 12px; padding: 10px 20px; }
    #clear-btn { display: none; margin-top: 8px; color: #666; background: none; border: none; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>

  <h1>Vaccine Arrival Report</h1>

  <div id="restore-banner" class="banner" style="display:none">
    <strong>You have a saved draft from a previous session.</strong>
    <br /><br />
    <button id="continue-btn">Continue where I left off</button>
    <button id="discard-btn">Start fresh</button>
  </div>

  <form id="vaccine-form">
    <label>Facility Code
      <input name="facilityCode" placeholder="e.g. DHK-042" required />
    </label>

    <label>Arrival Date
      <input name="arrivalDate" type="date" required />
    </label>

    <label>Batch Number
      <input name="batchNumber" placeholder="e.g. VX-2024-001" required />
    </label>

    <label>Quantity (doses)
      <input name="quantity" type="number" min="1" required />
    </label>

    <label>Manufacturer
      <input name="manufacturer" placeholder="e.g. Serum Institute" required />
    </label>

    <label>Notes
      <textarea name="notes" rows="3" placeholder="Optional inspection notes"></textarea>
    </label>

    <button type="submit">Submit Report</button>
  </form>

  <button id="clear-btn">🗑 Clear saved data</button>

  <script type="module">
    import { FormPersist } from "https://cdn.jsdelivr.net/npm/form-persist/dist/index.esm.js"

    const form = document.getElementById("vaccine-form")
    const restoreBanner = document.getElementById("restore-banner")
    const continueBtn = document.getElementById("continue-btn")
    const discardBtn = document.getElementById("discard-btn")
    const clearBtn = document.getElementById("clear-btn")

    const persist = new FormPersist({
      key: "vaccine-arrival-plain",
      ttl: "24h",
      clearOnSubmit: true,
      onExpire: () => {
        alert("Your saved form data has expired. Starting fresh.")
      },
      onClear: (reason) => {
        restoreBanner.style.display = "none"
        clearBtn.style.display = "none"
      },
    })

    // Check for saved data on page load
    const hasData = await persist.hasData()
    if (hasData) {
      restoreBanner.style.display = "block"
      clearBtn.style.display = "inline"
    }

    // Restore saved data into form fields
    async function restoreForm() {
      const saved = await persist.restore()
      if (!saved) return
      const data = saved.steps[0]?.data ?? {}
      for (const [name, value] of Object.entries(data)) {
        const el = form.elements.namedItem(name)
        if (el) el.value = String(value)
      }
      restoreBanner.style.display = "none"
    }

    continueBtn.addEventListener("click", restoreForm)

    discardBtn.addEventListener("click", async () => {
      await persist.reset()
      form.reset()
    })

    clearBtn.addEventListener("click", async () => {
      if (confirm("This will clear your saved form progress. Continue?")) {
        await persist.reset()
        form.reset()
      }
    })

    // Auto-attach saves form data as the user types (debounced 300ms)
    const detach = persist.attach(form, {
      debounce: 300,
      onRestore: (saved) => {
        // Called when attach() finds and restores saved data automatically
        console.log("Auto-restored from step:", saved.currentStep)
        restoreBanner.style.display = "none"
        clearBtn.style.display = "inline"
      },
    })

    form.addEventListener("submit", async (e) => {
      e.preventDefault()

      const data = Object.fromEntries(new FormData(form).entries())

      const res = await fetch("/api/vaccine-arrival", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data),
      })

      if (res.ok) {
        await persist.clear("submit")
        form.reset()
        alert("Report submitted successfully!")
      } else {
        alert("Submission failed. Your progress has been saved — try again later.")
      }
    })
  </script>
</body>
</html>
